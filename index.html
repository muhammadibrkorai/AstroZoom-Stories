<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroZoom Stories - v2.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .story-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            padding: 2.5rem;
            border-radius: 1.5rem;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div id="root" class="story-card">
        <h1 class="text-4xl font-bold mb-2 text-white">AstroZoom Stories</h1>
        <p class="text-blue-400 font-medium mb-8">Version 2.3 | Live Update</p>
        
        <div class="text-left space-y-4">
            <p class="text-lg text-slate-300 leading-relaxed">
                Welcome to the Saturday update! This story module is now running live via GitHub Pages.
            </p>
            <div class="h-px bg-slate-800 my-4"></div>
            <p class="text-slate-400 italic">
                Innovation, Practicality, and Value.
            </p>
        </div>
    </div>
</body>
</html>
