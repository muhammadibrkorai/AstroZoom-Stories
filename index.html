<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroZoom Global Stories - v2.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      // 🔑 PASTE YOUR FIREBASE CONFIG KEYS BELOW
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // Function to Save Story
      window.submitStory = async () => {
          const text = document.getElementById('storyInput').value;
          if(!text) return alert("Write something first!");

          try {
              await addDoc(collection(db, "stories"), {
                  content: text,
                  timestamp: serverTimestamp()
              });
              alert("Innovation Successful! Story saved to the cloud.");
              document.getElementById('storyInput').value = "";
          } catch (e) {
              console.error("Error: ", e);
              alert("Something went wrong. Check the console.");
          }
      }
    </script>
</head>
<body class="bg-slate-950 text-white p-8">
    <div class="max-w-2xl mx-auto bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-2xl">
        <h1 class="text-3xl font-bold text-blue-400 mb-2">AstroZoom Global</h1>
        <p class="text-slate-500 mb-6 italic">Innovation • Practicality • Value</p>

        <textarea id="storyInput" class="w-full h-40 p-4 bg-slate-800 border border-slate-700 rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Write a story for the world to see..."></textarea>
        
        <button onclick="submitStory()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold text-lg shadow-lg shadow-blue-900/20 transition-all">
            Upload to Global Server
        </button>
    </div>
</body>
</html>
