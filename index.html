<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroZoom Stories - Global Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      // 🔑 PASTE YOUR CONFIG HERE
      const firebaseConfig = {
        apiKey: // 🔑 PASTE YOUR CONFIG HERE
      const firebaseConfig = {
        apiKey: "YOUR_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
      };,
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // --- 1. SENDING STORIES ---
      window.submitStory = async () => {
          const text = document.getElementById('storyInput').value;
          if(!text) return alert("Please write a story first!");
          await addDoc(collection(db, "stories"), {
              content: text,
              timestamp: serverTimestamp()
          });
          document.getElementById('storyInput').value = "";
      };

      // --- 2. SHOWING STORIES ---
      const q = query(collection(db, "stories"), orderBy("timestamp", "desc"));
      onSnapshot(q, (snapshot) => {
          const list = document.getElementById('storyList');
          list.innerHTML = ""; // Clear list
          snapshot.forEach((doc) => {
              const data = doc.data();
              const div = document.createElement('div');
              div.className = "p-4 bg-slate-800 rounded-lg border border-slate-700 mb-3 animate-fade-in";
              div.innerHTML = `<p class="text-slate-200">${data.content}</p>
                               <small class="text-slate-500">${data.timestamp?.toDate().toLocaleString() || 'Just now'}</small>`;
              list.appendChild(div);
          });
      });
    </script>
</head>
<body class="bg-slate-950 text-white font-sans p-6">
    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-blue-400">AstroZoom Global</h1>
            <p class="text-slate-400 italic">Innovation • Practicality • Value</p>
        </header>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 mb-8">
            <textarea id="storyInput" class="w-full h-32 p-4 bg-slate-800 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Write your story for the world..."></textarea>
            <button onclick="submitStory()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold transition">Post Story</button>
        </div>

        <h2 class="text-2xl font-semibold mb-4 text-blue-300">Live Stories</h2>
        <div id="storyList" class="space-y-4">
            <p class="text-slate-600">Connecting to global server...</p>
        </div>
    </div>
</body>
</html>
