<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroZoom Global Stories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; padding: 20px; }
        .upload-box { background: #0f172a; border: 2px dashed #334155; padding: 2rem; border-radius: 1rem; max-width: 800px; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="upload-box">
        <h1 class="text-3xl font-bold text-blue-400 mb-2">AstroZoom: Share Your Story</h1>
        <p class="text-slate-400 mb-6">Innovation. Practicality. Value.</p>

        <textarea id="storyInput" class="w-full h-40 p-4 bg-slate-900 border border-slate-700 rounded-lg mb-4 text-white" placeholder="Write your story here..."></textarea>

        <div class="flex flex-col items-center justify-center border-2 border-slate-800 rounded-lg p-6 mb-4 bg-slate-900/50">
            <input type="file" id="imageUpload" class="text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700" accept="image/*">
            <p class="mt-2 text-xs text-slate-500">Add an image to your narrative</p>
        </div>

        <button onclick="submitStory()" class="w-full py-3 bg-green-600 hover:bg-green-700 rounded-lg font-bold text-lg transition">Post to the World</button>
    </div>

    <script>
        function submitStory() {
            const story = document.getElementById('storyInput').value;
            if(story) {
                alert("AstroZoom Alert: Your story is ready for the 100TB server! (Currently in Preview Mode)");
            } else {
                alert("Please write something first!");
            }
        }
    </script>
</body>
</html>
